        好的，讓我看看 →

    <div id="cards" class="space-y-4"></div>

    <div id="empty" class="hidden text-center py-16">

    function getStatusBadge(item) {
      const s = item.status;
      if (s === 'cancelled') {
        const validText = item.validUntil ? `有效至 ${item.validUntil}` : '';
        const note = item.statusNote ? ` · ${item.statusNote}` : '';
        return `<span class="px-2.5 py-0.5 bg-red-100 text-red-700 rounded-full text-xs font-medium">✅ 已取消</span>` +
          (validText ? `<span class="text-xs text-gray-400 ml-1">${validText}${note}</span>` : '');
      }
      if (s === 'one-time') {
        return `<span class="px-2.5 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">一次性消費</span>`;
      }
      if (s === 'downgraded-free') {
        return `<span class="px-2.5 py-0.5 bg-emerald-100 text-emerald-700 rounded-full text-xs font-medium">✅ 已降免費</span>` +
          (item.statusNote ? `<span class="text-xs text-gray-400 ml-1">${item.statusNote}</span>` : '');
      }
      if (s === 'downgraded') {
        return `<span class="px-2.5 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">⬇️ 已降級</span>` +
          (item.statusNote ? `<span class="text-xs text-gray-400 ml-1">${item.statusNote}</span>` : '');
      }
      if (s === 'in-use') {
        return `<span class="px-2.5 py-0.5 bg-teal-100 text-teal-700 rounded-full text-xs font-medium">使用中</span>`;
      }
      // No status = pending
      if (item.statusNote) {
        return `<span class="text-xs text-amber-600">${item.statusNote}</span>`;
      }
      return `<span class="px-2.5 py-0.5 bg-amber-100 text-amber-700 rounded-full text-xs font-medium">⏳ 待確認</span>`;
    }

    function isResolved(item) {
      return ['cancelled', 'one-time', 'downgraded-free', 'downgraded', 'in-use'].includes(item.status);
    }

    function render() {
      // Calculate stats
      const pending = suggestions.filter(i => !isResolved(i));
      const cancelled = suggestions.filter(i => i.status === 'cancelled');
      const downgraded = suggestions.filter(i => i.status === 'downgraded' || i.status === 'downgraded-free');

      const pendingUsd = pending.reduce((s, i) => s + (i.usd || 0), 0);
      const savedUsd = cancelled.reduce((s, i) => s + (i.usd || 0), 0)
        + downgraded.reduce((s, i) => s + ((i.origUsd || i.usd) - i.usd), 0);
      const totalTwd = suggestions.reduce((s, i) => s + i.history.reduce((hs, h) => hs + h.twd, 0), 0);

      document.getElementById('monthlySave').textContent = '$' + pendingUsd.toFixed(2);
      document.getElementById('monthlySaved').textContent = '$' + savedUsd.toFixed(2);
      document.getElementById('totalSpent').textContent = 'NT$' + totalTwd.toLocaleString();

      if (!suggestions.length) {
        document.getElementById('empty').classList.remove('hidden');
        return;
      }

      const container = document.getElementById('cards');

      // Group: resolved first, then pending
      const resolved = suggestions.filter(i => isResolved(i));
      const pendingItems = suggestions.filter(i => !isResolved(i));

      function renderSection(title, icon, items, collapsed) {
        if (!items.length) return;
        const section = document.createElement('div');
        section.className = 'mb-6';
        section.innerHTML = `<h2 class="text-lg font-bold text-gray-700 mb-3 flex items-center gap-2"><span>${icon}</span> ${title} <span class="text-sm font-normal text-gray-400">(${items.length})</span></h2>`;
        items.forEach(item => {
          const typeBadge = item.type === 'personal'
            ? '<span class="px-2.5 py-0.5 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">個人</span>'
            : '<span class="px-2.5 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-medium">公司</span>';

          const isCancelled = item.status === 'cancelled' || item.status === 'one-time' || item.status === 'downgraded-free';
          const cardOpacity = isCancelled ? 'opacity-70' : '';
          const priceStrike = (item.status === 'cancelled' || item.status === 'downgraded-free') ? 'line-through text-gray-400' : 'text-amber-600';
          const priceColor = item.status === 'downgraded' ? 'text-blue-600' : priceStrike;

          const card = document.createElement('div');
          card.className = `bg-white/60 backdrop-blur-xl rounded-3xl p-5 sm:p-6 border border-white/50 shadow-lg mb-4 ${cardOpacity}`;
          card.innerHTML = `
            <div class="flex items-start justify-between">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 sm:gap-3 mb-1 flex-wrap">
                  <h3 class="text-lg sm:text-xl font-bold text-gray-800">${item.name}</h3>
                  ${typeBadge}
                  <span class="px-2.5 py-0.5 bg-amber-100 text-amber-700 rounded-full text-xs font-medium">${item.card}</span>
                </div>
                <p class="text-gray-500 text-sm mb-1">${item.desc}</p>
                <div class="flex items-center gap-1 flex-wrap">${getStatusBadge(item)}</div>
              </div>
              <div class="text-right ml-4 sm:ml-6 flex-shrink-0">
                ${item.origUsd ? `<div class="text-sm line-through text-gray-400">$${item.origUsd.toFixed(2)}</div>` : ''}
                <div class="text-2xl sm:text-3xl font-bold ${priceColor}">$${item.usd?.toFixed(2) || '—'}</div>
                <div class="text-xs text-gray-400">${item.status === 'one-time' ? '' : '/ 月'}</div>
              </div>
            </div>
            <details class="mt-4 pt-4 border-t border-gray-100">
              <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-600">帳單紀錄 (${item.history.length})</summary>
              <div class="flex flex-wrap gap-2 mt-2">
                ${item.history.map(h => `<div class="px-3 py-1.5 bg-gray-50 rounded-xl text-xs text-gray-600 border border-gray-100">${h.date} — NT$${h.twd.toLocaleString()}</div>`).join('')}
              </div>
            </details>
          `;
          section.appendChild(card);
        });
        container.appendChild(section);
      }

      renderSection('⏳ 待確認', '📋', pendingItems);
      renderSection('✅ 已處理', '📁', resolved);
    }

    // Auto-play on page load
    window.addEventListener('load', () => {
      const video = document.getElementById('introVideo');
      const audio = document.getElementById('introAudio');
      const skipBtn = document.getElementById('skipBtn');
      const hint = document.getElementById('introHint');

      video.play().catch(() => {});
      audio.play().catch(() => {
        hint.textContent = '點擊任意處播放';
        document.getElementById('intro').addEventListener('click', function handler() {
          video.play().catch(() => {});
          audio.play().catch(() => {});
          hint.textContent = '語音播放中...';
          document.getElementById('intro').removeEventListener('click', handler);
        }, { once: true });
      });

      audio.addEventListener('ended', () => {
        hint.textContent = '';
        skipBtn.textContent = '好的，讓我看看 →';
        skipBtn.classList.remove('bg-white/60', 'text-amber-700', 'border-amber-200');
        skipBtn.classList.add('bg-gradient-to-r', 'from-amber-400', 'to-orange-400', 'text-white', 'shadow-lg', 'shadow-amber-400/30');
      });
    });

    function dismissIntro() {
      const el = document.getElementById('intro');
      el.classList.add('fade-out');
      setTimeout(() => el.style.display = 'none', 600);
      const audio = document.getElementById('introAudio');
      audio.pause();
    }

    render();
  </script>
